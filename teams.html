<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>One Date Club — Team Auction Summary</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="nav">
    <div class="brand">
      <div class="logo" aria-hidden="true"></div>
      <div>
        One Date Club — 隊伍拍賣摘要
      </div>
    </div>

    <div class="nav-actions">
      <a class="btn" href="index.html">🏠 返回遊戲</a>
      <a class="btn" href="items.html">🧾 拍賣目錄</a>
      <a class="btn" href="rules.html">📜 遊戲規則</a>
      <a class="btn primary" href="teams.html">👥 隊伍列表</a>
    </div>
  </div>

  <main class="wrap">
    <section class="card">
      <div class="card-h">
        <h2>隊伍拍賣摘要</h2>
        <span class="pill">出價歷史</span>
      </div>
      <div class="card-b teamList teamTableWrapper" id="teamList"></div>
    </section>

    <section class="card">
      <div class="card-h">
        <h3>成交紀錄</h3>
      </div>
      <div class="card-b">
        <div class="log" id="log"></div>
      </div>
    </section>
  </main>
  
  <script src="constant.js"></script>
  <script>
    (function() {
      function freshState() {
        return {
          teams: Array.from({ length: TEAM_COUNT }, (_, i) => ({
            id: i,
            name: TEAM_NAMES[i] || `Team ${String.fromCharCode(65 + i)}`,
            diamonds: START_DIAMONDS,
            color: teamColors[i % teamColors.length],
            wins: []
          })),
          rounds: Array.from({ length: ROUND_COUNT }, (_, i) => ({
            id: i + 1,
            bids: Array(TEAM_COUNT).fill(null),
            winnerTeamId: null,
            winningBid: null
          })),
          log: []
        };
      }

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return freshState();
          const parsed = JSON.parse(raw);
          if (!parsed?.teams || !parsed?.rounds) return freshState();

          const teams = (parsed.teams || []).slice(0, TEAM_COUNT).map((team, i) => ({
            id: i,
            name: TEAM_NAMES[i] || team.name || `Team ${String.fromCharCode(65 + i)}`,
            diamonds: Number.isFinite(team.diamonds) ? team.diamonds : START_DIAMONDS,
            color: team.color || teamColors[i % teamColors.length],
            wins: Array.isArray(team.wins) ? team.wins : []
          }));

          const rounds = (parsed.rounds || []).slice(0, ROUND_COUNT).map((round, i) => ({
            id: i + 1,
            bids: Array.isArray(round.bids) ? round.bids.slice(0, TEAM_COUNT) : Array(TEAM_COUNT).fill(null),
            winnerTeamId: Number.isFinite(round.winnerTeamId) ? round.winnerTeamId : null,
            winningBid: Number.isFinite(round.winningBid) ? round.winningBid : null
          }));

          return {
            teams,
            rounds,
            log: Array.isArray(parsed.log) ? parsed.log : []
          };
        } catch {
          return freshState();
        }
      }

      function getItemById(id) {
        return items.find(x => x.id === id) || { icon: "❔", name: `物品 ${id}` };
      }

      function renderTeams(state) {
        const elTeamList = document.getElementById("teamList");
        elTeamList.innerHTML = "";

        const table = document.createElement("table");
        table.className = "teamsTable";

        const rankMaps = state.teams.reduce((acc, team) => {
          const teamBids = state.rounds.map(round => round.bids?.[team.id]).filter(b => Number.isFinite(b));
          const uniqueSortedBids = [...new Set(teamBids)].sort((a, b) => b - a);
          acc[team.id] = uniqueSortedBids.reduce((map, bid, index) => {
            map[bid] = index + 1;
            return map;
          }, {});
          return acc;
        }, {});

        const headerHtml = `
          <thead>
            <tr>
              <th class="teamsTableRoundHeader">拍賣品</th>
              ${state.teams.map(team => `<th><div class="dot" style="background:${team.color}; display: inline-block;"></div>    ${team.name}</th>`).join("")}
            </tr>
            <tr class="teamsTableRound">
              <th class="teamsTableRowHeader">
                <div class="roundHeaderContent">
                  <span class="teamRoundIcon">💎</span>
                  <div class="roundHeaderText">
                    <div class="teamRoundName">鑽石餘額</div>
                  </div>
                </div>
              </th>
              ${state.teams.map(team => `<td class="cellCenter"><div class="diamond">${team.diamonds}</div></td>`).join("")}
            </tr>
          </thead>
        `;

        const bodyHtml = state.rounds.map(round => {
          const item = getItemById(round.id);

          return `
            <tr class="teamsTableRound">
              <th class="teamsTableRowHeader">
                <div class="roundHeaderContent">
                  <span class="teamRoundIcon">${item.icon}</span>
                  <div class="roundHeaderText">
                    <div class="teamRoundName">${item.desc}</div>
                    <!--<div class="small">第 ${round.id} 回合</div>-->
                  </div>
                </div>
              </th>
              ${state.teams.map(team => {
                const bid = round.bids?.[team.id];
                const won = round.winnerTeamId !== null && round.winnerTeamId === team.id;
                const rank = Number.isFinite(bid) ? rankMaps[team.id]?.[bid] : null;
                const rankHtml = rank ? `<span class="cellRank">#${rank}</span>` : "";
                const priceText = Number.isFinite(bid) ? `${rankHtml}${bid}` : "未出價";
                const statusText = won ? "中標" : "";

                return `
                  <td class="${won ? "winCell" : ""}">
                    <div class="cellPrice">${priceText}                     
                      <!--${statusText ? `<div class="small cellStatus">${statusText}</div>` : ""}-->
                    </div>
                  </td>
                `;
              }).join("")}
            </tr>
          `;
        }).join("");

        table.innerHTML = headerHtml + `<tbody>${bodyHtml}</tbody>`;
        elTeamList.appendChild(table);
      }

      function renderLog(state) {
        const elLog = document.getElementById("log");
        elLog.innerHTML = "";

        if (!state.log || state.log.length === 0) {
          const empty = document.createElement("div");
          empty.className = "logItem";
          empty.textContent = "尚無成交紀錄。";
          elLog.appendChild(empty);
          return;
        }

        state.log.slice().reverse().forEach(entry => {
          const div = document.createElement("div");
          div.className = "logItem";
          div.innerHTML = entry;
          elLog.appendChild(div);
        });
      }

      function init() {
        const state = loadState();
        renderTeams(state);
        renderLog(state);
      }

      init();
    })();
  </script>
  <!--<footer class="footer">
    © 2026 Flow Church Actionable One Date Club — All Rights Reserved
  </footer>-->
</body>
</html>
