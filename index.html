<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>One Date Club — Life Auction Game</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="nav">
    <div class="brand">
      <div class="logo" aria-hidden="true"></div>
      <div>
        One Date Club — Life Auction Game 人生拍賣遊戲
        <!--<div class="small">5 teams • 8 rounds • Start with 100 diamonds</div>-->
      </div>
    </div>

    <div class="nav-actions">
      <button class="btn" id="timerBtn" title="Open countdown timer">⏱️ 計時器</button>
      <a class="btn" href="rules.html">📜 遊戲規則</a>
      <a class="btn" href="items.html">🧾 拍賣目錄</a>
      <button class="btn danger" id="resetBtn" title="Reset all rounds and diamonds">重置遊戲</button>
    </div>
  </div>

  <div class="wrap grid">
    <!-- Main Panel -->
    <div class="card">
      <div class="card-h">
        <h2>拍賣品清單</h2>
        <span class="pill" id="statusPill">未成交</span>
      </div>

      <div class="card-b">

        <div>
          <div class="rounds" id="roundButtons"></div>
        </div>

        <div class="sep"></div>

        <div class="grid2">
          <!-- Auction Item -->
          <div class="card" style="box-shadow:none;">
            <div class="card-h">
              <h3 id="roundTitle">拍賣品: —</h3>
              <span class="pill" id="roundStatePill">Idle</span>
            </div>
            <div class="card-b itemBox">
              <h4 class="itemTitle" id="itemName">討論時間</h4>
              <p class="itemDesc" id="itemDesc">點擊編號以顯示拍賣物</p>

              <div class="mapWrap" id="mapWrap" style="display:none;">
                <img id="itemMap" alt="Map for the auction item" />
              </div>
            </div>
          </div>

          <!-- Bids -->
          <div class="card" style="box-shadow:none;">
            <div class="card-h">
              <h3>隊伍投標</h3>
              <span class="pill" id="bidHintPill">Enter bids</span>
            </div>
            <div class="card-b">
              <div class="bidBBox" id="bidBox">
                <div class="bids" id="bidInputs"></div>
                <div class="hint" id="bidHint">Start a round to enable bid inputs.</div>

                <div class="err" id="errorBox"></div>

                <div style="margin-top:12px; display:flex; gap:10px; flex-wrap:wrap;">
                  <button class="btn primary" id="battleBtn" disabled>確認出價</button>
                  <button class="btn" id="clearBidsBtn" disabled>清空</button>
                </div>
              </div>
              <!-- Battle results -->
              <div class="battleBox" id="battleBox">
                <div style="font-weight:1000;">前兩名隊伍說服評判</div>
                <div class="topGrid" id="topGrid"></div>

                <div class="winnerPick" id="winnerPick"></div>

                <div class="winnerActions">
                  <button class="btn primary" id="confirmWinnerBtn" disabled>確認中標者並扣除鑽石</button>
                </div>

                <div class="hint" style="margin-top:8px;">
                  評判將根據隊伍的說服力選出中標者，並從該隊伍的鑽石中扣除相應金額。
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="sep"></div>

        <!-- Log -->
        <div class="card" style="box-shadow:none;">
          <div class="card-h">
            <h3>成交記錄</h3>
            <span class="pill" id="progressPill">0 / 8 成交</span>
          </div>
          <div class="card-b">
            <div class="log" id="log"></div>
            <div class="footerNote" id="endNote" style="display:none;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Side Panel -->
    <div class="card">
      <div class="card-h">
        <h2>隊伍狀態</h2>
        <span class="pill">初始資金100鑽</span>
      </div>
      <div class="card-b">
        <div class="teamList" id="teamList"></div>
        <div class="footerNote">
          中標拍賣品以圖示形式顯示在相應隊伍名稱下
        </div>
      </div>
    </div>
  </div>

  <div class="timer-modal" id="timerModal" aria-hidden="true">
    <div class="timer-card" role="dialog" aria-modal="true" aria-labelledby="timerTitle">
      <button class="closeBtn" id="timerCloseBtn" aria-label="Close timer">×</button>
      <div class="timer-header">
        <div id="timerTitle">計時器</div>
      </div>

      <div class="timer-display" id="timerDisplay">02:00</div>
      <div class="timer-form">
        <label for="timerInput">設定時間 (mm:ss)</label>
        <input id="timerInput" class="timer-input" type="text" placeholder="05:00" value="02:00" aria-label="Set timer in minutes and seconds" />
      </div>
      <div class="timer-actions-wrapper">
        <div class="timer-status" id="timerStatus">準備就緒</div>
        <div class="timer-actions">
          <button class="btn primary" id="timerStartBtn">開始</button>
          <button class="btn" id="timerResetBtn">重設</button>
        </div>
      </div>
    </div>
  </div>
  
  <script src="constant.js"></script>
  <script src="game.js"></script>
  <!--<footer class="footer">
    © 2026 Flow Church Actionable One Date Club — All Rights Reserved
  </footer>-->
</body>
</html>
