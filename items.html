<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>One Date Club — Life Auction Game</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="nav">
    <div class="brand">
      <div class="logo" aria-hidden="true"></div>
      <div>One Date Club — Life Auction Game 人生拍賣遊戲</div>
    </div>
    <div class="nav-actions">
      <a class="btn" href="index.html">🏠 返回遊戲</a>
      <a class="btn primary" href="items.html">🧾 拍賣目錄</a>
      <a class="btn" href="rules.html">📜 遊戲規則</a>
    </div>
  </div>

  <div class="wrap">
    <div class="card">
      <div class="card-b">
        <h1 style="margin:0 0 10px 0;">拍賣品清單</h1>

        <div class="list" id="itemsList"></div>
      </div>
    </div>
  </div>

<script src="constant.js"></script>
<script>
(() => {
  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return null;
      return JSON.parse(raw);
    }catch{
      return null;
    }
  }

  const state = loadState();
  const teams = state?.teams || [];
  const rounds = state?.rounds || [];

  function winnerForItem(roundId){
    const r = rounds[roundId - 1];
    if(!r || !r.done) return null;
    const t = teams[r.winnerTeamId];
    return t ? t.name : null;
  }

  const list = document.getElementById("itemsList");
  list.innerHTML = items.map(it => {
    const winnerName = winnerForItem(it.id);
    const tag = winnerName ? `中標者: ${winnerName}` : "中標者: N/A";
    return `
      <div class="item">
        <div class="left">
          <div class="icon">${it.icon}</div>
          <div>
            <div class="name">拍賣品 ${it.id}</div>
            <div class="desc">${it.desc}</div>
          </div>
        </div>
        <div class="tag">${tag}</div>
      </div>
    `;
  }).join("");
})();
</script>
  <!--<footer class="footer">
    © 2026 Flow Church Actionable One Date Club — All Rights Reserved
  </footer>-->
</body>
</html>
